name = "agent-memory"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "agent-memory"
database_id = "fbea37b7-469d-42d9-9fd8-c86d463e44bd"

[[vectorize]]
binding = "VECTORIZE"
index_name = "agent-memory"

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"

# Secrets (set via: wrangler secret put OPENAI_API_KEY)
# OPENAI_API_KEY
